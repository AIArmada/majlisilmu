name: Quality

on:
  push:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Rector, Pint, PHPStan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          extensions: mbstring, dom, fileinfo, intl, pcntl, pdo_sqlite, sqlite3, pgsql
          ini-values: memory_limit=-1

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Prepare application environment
        run: cp .env.example .env

      - name: Install Composer dependencies
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          composer config --global github-oauth.github.com "$GITHUB_TOKEN"
          composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Generate application key
        run: php artisan key:generate --ansi --force

      - name: Clear config cache
        run: php artisan config:clear --ansi

      - name: Run Rector
        run: vendor/bin/rector process --dry-run --ansi

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --ansi --no-progress

  pest:
    name: Pest (Shard ${{ matrix.shard }}/4)
    needs: static-analysis
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          extensions: mbstring, dom, fileinfo, intl, pcntl, pdo_sqlite, sqlite3, pgsql
          ini-values: memory_limit=-1

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Prepare application environment
        run: cp .env.example .env

      - name: Install Composer dependencies
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          composer config --global github-oauth.github.com "$GITHUB_TOKEN"
          composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Generate application key
        run: php artisan key:generate --ansi --force

      - name: Clear config cache
        run: php artisan config:clear --ansi

      - name: Run Pest shard
        run: vendor/bin/pest --parallel --shard=${{ matrix.shard }}/4 --compact